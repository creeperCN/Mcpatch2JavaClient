# 更新服务器地址，可以填写多个备用地址，当一个不可用时会切换到备用地址上
# 目前支持的协议：http(s)、webdav(s)、私有协议
#
# http协议的例子：（填写索引文件index.json所在的目录就好，不需要填写index.json本身）
#   1. http://127.0.0.1:6700 （走http协议）
#   2. https://127.0.0.1:6700/subfolder （走https协议）
#
# webdav协议的例子：（webdav代表走http协议，webdavs代表走https协议，要这样写只是为了和http源做区分）
#   1. webdav://user:pass:127.0.0.1:80   （webdav走http协议）
#   2. webdavs://user:pass:127.0.0.1:443 （webdav走https协议）
#   注：需要把user和pass这两个地方换成自己的账号密码，127.0.0.1换成主机地址，端口号不能省略
#
# 私有协议的例子：（私有协议是mcpatch自己的协议，无需备案，如果做内网穿透请走普通tcp隧道而非http隧道）
#   1. mcpatch://127.0.0.1:6700 （私有协议以mcpatch开头，只需要主机和端口号即可，无需输入子目录）
#
urls:
  - mcpatch://127.0.0.1:6700 # 若在公网部署记得换成自己的公网ip或者域名

# 记录客户端版本号文件的路径
# 客户端的版本号会被存储在这个文件里，并以此为依据判断是否更新到了最新版本
version-file-path: version-label.txt

# 当程序发生错误而更新失败时，是否可以继续进入游戏
# 如果为true，发生错误时会忽略错误，正常启动游戏，但是可能会因为某些新模组未下载无法进服
# 如果为false，发生错误时会直接崩溃掉Minecraft进程，停止游戏启动过程
# 此选项仅当程序以非图形模式启动时有效，因为在图形模式下，会主动弹框并将选择权交给用户
allow-error: false

# 在没有更新时，是否显示“资源文件暂无更新!”提示框
show-no-update-message: true

# 在有更新时，是否显示更新日志提示框
show-has-update-message: true

# 自动关闭更新日志的时间，单位为毫秒。设置为0代表不会自动关闭更新日志窗口，需要手点
auto-close-changelogs: 0

# 安静模式，是否只在下载文件时才显示窗口
# 如果为true，程序启动后在后台静默检查文件更新，而不显示窗口，若没有更新会直接启动Minecraft，
#            有更新的话再显示下载进度条窗口，此选项可以尽可能将程序的存在感降低（适合线上环境）
# 如果为false，每次都正常显示窗口（适合调试环境）
# 此选项仅当程序以图形模式启动时有效
silent-mode: false

# 是否禁用界面主题
# true: 禁用界面主题，可以解决窗口出现无响应的问题！
# false: 不会禁用界面主题，运行在某些机器上时可能会出现窗口出现无响应的问题！
disable-theme: false

# 窗口标题，可以自定义更新时的窗口标题
# 只有在桌面环境上时才有效，因为非桌面环境没法弹出窗口
window-title: Mcpatch

# 更新的起始目录，也就是要把文件都更新到哪个目录下
# 默认情况下程序会智能搜索，并将所有文件更新到.minecraft父目录下（也是启动主程序所在目录），
# 这样文件更新的位置就不会随主程序文件的工作目录变化而改变了，每次都会更新在相同目录下。
# 如果你不喜欢这个智能搜索的机制，可以修改此选项来把文件更新到别的地方（十分建议保持默认不要修改）
# 1. 当此选项的值是空字符串''时，会智能搜索.minecraft父目录作为更新起始目录（这也是默认值）
# 2. 当此选项的值是'.'时，会把当前工作目录作为更新起始目录
# 3. 当此选项的值是'..'时，会把当前工作目录的上级目录作为更新起始目录
# 4. 当此选项的值是别的时，比如'ab/cd'时，会把当前工作目录下的ab目录里面的cd目录作为更新起始目录
base-path: ''

# 设置私有协议的超时判定时间，单位毫秒，值越小判定越严格
# 网络环境较差时可能会频繁出现连接超时，那么此时可以考虑增加此值（建议30s以下）
private-timeout: 7000

# 设置 http 系协议的连接超时判定时间，单位毫秒，值越小判定越严格
# 网络环境较差时可能会频繁出现连接超时，那么此时可以考虑增加此值（建议30s以下）
http-timeout: 7000

# 为 http 系协议设置 headers
http-headers:
#  User-Agent: This filled by youself # 这是一个自定义UserAgent的配置示例

# 出现网络问题时的重试次数，适用于所有协议，最大值不建议超过100<p>
# 当服务器没有及时响应数据时，会消耗1次重试次数，然后进行重新连接<p>
# 当所有的重试次数消耗完后，程序才会真正判定为超时，并弹出网络错误对话框<p>
# 建议 timeout * retries 的总时间控制在20秒以内，避免玩家等的太久
retries: 3

# 设置 http 系协议是否忽略SSL证书验证
ignore-ssl-cert: false

# 是否忽略对http协议中content-length的校验
ignore-http-content-length: false

# 测试模式，专门用来调试更新时的网速
# 开启后每次都会重头更新，且不会优化任何文件下载
# 仅用于测试用途，平时正常使用勿开
test-mode: false

# ============================================
# 多线程下载配置（v2.0+ 新增功能）
# ============================================

# 最大并行下载线程数
# 0: 自动根据文件总大小决定（<1MB=1线程, 1-10MB=2线程, 10-50MB=3线程, 50-100MB=4线程, 100-500MB=6线程, >500MB=8线程）
# >0: 手动指定最大线程数（不超过CPU核心数）
max-threads: 0

# 分片下载配置（用于加速单个大文件下载）
# 仅当文件大小大于 5MB 时才会启用分片下载

# 分片大小，单位字节，默认 1MB (1048576)
# 将单个大文件分成多个片段并行下载，最后合并
chunk-size: 1048576

# 最大分片数，默认 16
# 避免小文件产生过多分片，限制单个文件最多分片数量
max-chunks: 16

# 是否启用分片下载，默认 true
# 如果分片下载出现问题，可设为 false 回退到普通下载模式
enable-chunked-download: true

# ============================================
# 防盗链配置（阿里云ESA A方案鉴权）
# ============================================

# 是否启用防盗链鉴权
# 启用后，下载文件时会先向鉴权服务器获取 auth_key，然后拼接到下载 URL 中
# 仅对 HTTP/HTTPS 协议生效，私有协议(mcpatch://)不受影响
anti-hotlink-enabled: false

# 鉴权 API 地址
# 用于生成符合阿里云ESA A方案规范的鉴权密钥(auth_key)
# 默认地址为官方提供的鉴权服务，如有自建服务可修改此地址
anti-hotlink-auth-url: https://auth-api.mxzysoa.com/generate-auth-url

# 鉴权 URL 有效时长，单位秒
# 建议与CDN端配置的鉴权有效时长保持一致
# 默认3600秒（1小时），auth_key在此时间内可复用，无需重复请求
anti-hotlink-expire-time: 3600

# 鉴权用户ID
# 根据业务需求设置，默认为0
anti-hotlink-uid: "0"