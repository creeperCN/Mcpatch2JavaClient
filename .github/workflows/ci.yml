name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: false

    - name: Remove problematic init.gradle if exists
      run: |
        if [ -f ~/.gradle/init.gradle ]; then
          echo "Found init.gradle, moving aside..."
          mv ~/.gradle/init.gradle ~/.gradle/init.gradle.bak
        fi

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run tests (if any)
      run: ./gradlew test

    - name: Create shadow JAR
      run: ./gradlew shadowJar

    - name: Verify JAR file
      run: |
        ls -lh build/libs/
        echo "JAR files created successfully"
