name: Java CI Build and Check

on:
  # 当有代码推送到 main/master 分支时触发
  push:
    branches: [ "main", "master" ]
  # 当有 Pull Request 指向 main/master 分支时触发
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Java 环境 (推荐使用 JDK 17，兼容性较好)
    # 如果你的项目必须使用 JDK 21 或 JDK 8，请修改下面的 java-version
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # 开启缓存以加速后续构建
        cache: 'gradle' 

    # 3. 赋予 Gradlew 执行权限 (仅限 Gradle 项目需要)
    - name: Grant execute permission for gradlew
      if: ${{ hashFiles('gradlew') != '' }}
      run: chmod +x gradlew

    # 4. 构建并检查代码
    # 这一步会自动判断是 Gradle 还是 Maven 并运行对应的命令
    - name: Build with Gradle
      if: ${{ hashFiles('build.gradle') != '' || hashFiles('build.gradle.kts') != '' }}
      run: ./gradlew build

    - name: Build with Maven
      if: ${{ hashFiles('pom.xml') != '' }}
      run: mvn -B package --file pom.xml
