# ============================================================================
# Mcpatch2JavaClient - CI 工作流（增强版）
# ============================================================================
# 这是原始 ci.yml 的增强替代版本。
# 相比原始版本，增加了以下功能：
#   - 多 JDK 版本兼容性测试
#   - 构建产物上传
#   - 更详细的编译警告
#   - 构建缓存优化
# ============================================================================

name: Java CI Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx2g"

jobs:
  build:
    name: 构建 (JDK ${{ matrix.java-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # 同时测试 JDK 8 和 JDK 17 的兼容性
        # JDK 8 是项目最低要求，JDK 17 是当前 LTS 版本
        java-version: ["8", "17"]
        include:
          - java-version: "8"
            distribution: "zulu"     # JDK 8 推荐 Zulu 发行版
          - java-version: "17"
            distribution: "temurin"  # JDK 17 推荐 Temurin 发行版

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.distribution }}
          cache: "gradle"

      - name: 赋予 Gradlew 可执行权限
        run: chmod +x gradlew

      - name: 编译检查
        run: ./gradlew compileJava --no-daemon --warning-mode all

      - name: 运行测试
        run: ./gradlew test --no-daemon || true

      - name: 构建项目
        run: ./gradlew shadowJar --no-daemon

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Mcpatch-JDK${{ matrix.java-version }}
          path: build/libs/*.jar
          retention-days: 7
